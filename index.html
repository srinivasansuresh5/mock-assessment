<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Assessment Exam</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="role-select-screen" class="card">
      <h1>Mock Assessment Exam</h1>
      <p class="subtitle">Select your role to begin</p>
      <div class="role-tiles">
        <button class="role-tile" id="engineer-tile">
          <h2>Engineer</h2>
          <p class="tile-meta">4 topics &bull; 60 questions &bull; 2 hours</p>
          <ul class="meta-list">
            <li>Pattern Recognition (30 min)</li>
            <li>Logical and Numerical Reasoning (30 min)</li>
            <li>Sequential Process Reasoning (30 min)</li>
            <li>Computational Reasoning (30 min)</li>
          </ul>
          <span class="btn primary tile-btn">Start Exam &rarr;</span>
        </button>
        <button class="role-tile" id="tpm-tile">
          <h2>Technical Product Manager</h2>
          <p class="tile-meta">4 topics &bull; 60 questions &bull; 2 hours</p>
          <ul class="meta-list">
            <li>Logical and Numerical Reasoning (30 min)</li>
            <li>Discovery and Strategy (30 min)</li>
            <li>Prioritization and Roadmapping (30 min)</li>
            <li>Requirements Definition (30 min)</li>
          </ul>
          <span class="btn primary tile-btn">Start Exam &rarr;</span>
        </button>
      </div>
    </section>

    <section id="exam-screen" class="card hidden">
      <header class="exam-header">
        <div>
          <h2 id="topic-title"></h2>
          <p id="question-counter" class="muted"></p>
        </div>
        <div class="timers">
          <div class="timer-chip">
            <span class="label">Topic</span>
            <span id="topic-timer">30:00</span>
          </div>
          <div class="timer-chip total">
            <span class="label">Total</span>
            <span id="total-timer">120:00</span>
          </div>
        </div>
      </header>

      <div class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>

      <article>
        <h3 id="question-text" class="question"></h3>
        <div id="options" class="options"></div>
      </article>

      <div id="feedback" class="feedback hidden"></div>

      <footer class="actions">
        <button id="next-btn" class="btn" disabled>Next</button>
      </footer>
    </section>

    <section id="topic-result-screen" class="card hidden"></section>
    <section id="final-result-screen" class="card hidden"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
